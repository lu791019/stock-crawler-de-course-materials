# 整合版：本地 build（老師 Mac 用 / DockerHub image 架構不符時備用）
# docker compose -f docker-compose-local.yml up -d --build rabbitmq flower mysql phpmyadmin worker_twse worker_tpex
# 等 worker ready 後：docker compose -f docker-compose-local.yml up producer

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "worker"
      RABBITMQ_DEFAULT_PASS: "worker"

  flower:
    image: mher/flower:latest
    container_name: flower
    restart: unless-stopped
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq
    command: ["celery", "--broker=amqp://worker:worker@rabbitmq:5672//", "flower", "--port=5555"]

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
    volumes:
      - mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

  worker_twse:
    build: .
    container_name: crawler_twse
    command: uv run python -m celery -A crawler.worker worker --loglevel=info --hostname=twse@%h -Q twse
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
      - PYTHONPATH=/crawler
    depends_on:
      - rabbitmq

  worker_tpex:
    build: .
    container_name: crawler_tpex
    command: uv run python -m celery -A crawler.worker worker --loglevel=info --hostname=tpex@%h -Q tpex
    restart: unless-stopped
    environment:
      - TZ=Asia/Taipei
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
      - PYTHONPATH=/crawler
    depends_on:
      - rabbitmq

  producer:
    build: .
    container_name: crawler_producer
    command: uv run python crawler/producer_multi_queue.py
    environment:
      - TZ=Asia/Taipei
      - RABBITMQ_HOST=rabbitmq
      - PYTHONPATH=/crawler
    depends_on:
      - rabbitmq

volumes:
  mysql:
