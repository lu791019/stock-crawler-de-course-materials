# 整合版：本地 build（老師 Mac 用 / DockerHub image 架構不符時備用）
# docker compose -f docker-compose-local.yml up -d --build rabbitmq flower mysql phpmyadmin worker_twse worker_tpex
# 等 worker ready 後：docker compose -f docker-compose-local.yml up producer

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: "worker"
      RABBITMQ_DEFAULT_PASS: "worker"

  flower:
    image: mher/flower:2.0
    container_name: flower
    command: ["celery", "--broker=amqp://worker:worker@rabbitmq", "flower", "--port=5555"]
    restart: always
    ports:
      - "5555:5555"
    depends_on:
      - rabbitmq

  mysql:
    image: mysql:8.0
    container_name: mysql
    command: --default-authentication-plugin=mysql_native_password
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-ppWgnb_mfGe2m_}
    restart: always
    volumes:
      - mysql:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

  worker_twse:
    build: .
    container_name: crawler_twse
    command: uv run celery -A crawler.worker worker --loglevel=info --hostname=twse -Q twse
    restart: always
    environment:
      - TZ=Asia/Taipei
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    depends_on:
      - rabbitmq

  worker_tpex:
    build: .
    container_name: crawler_tpex
    command: uv run celery -A crawler.worker worker --loglevel=info --hostname=tpex -Q tpex
    restart: always
    environment:
      - TZ=Asia/Taipei
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    depends_on:
      - rabbitmq

  producer:
    build: .
    container_name: crawler_producer
    command: uv run python crawler/producer_multi_queue.py
    environment:
      - TZ=Asia/Taipei
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq

volumes:
  mysql:
