version: '3.0'  # 使用 Docker Compose 的版本 3.0，適合大部分部署場景

services:
  crawler_twse:  # 定義一個服務，名稱為 crawler_twse
    build:
      context: ..
      dockerfile: Dockerfile
    # hostname 不寫死，讓 Docker 自動分配（scale 時才不會衝突）
    command: uv run python -m celery -A crawler.worker worker --loglevel=info --hostname=%h -Q twse
    # 啟動容器後執行的命令，這裡是啟動 Celery worker，指定 app 為 crawler.worker，設定日誌等級為 info，
    # 使用主機名稱當作 worker 名稱（%h），並將此 worker 加入名為 "twse" 的任務佇列 (queue)

    restart: always  # 若容器停止或崩潰，自動重新啟動
    environment:
      - TZ=Asia/Taipei  # 設定時區為台北（UTC+8）
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    networks:
      - my_network  # 將此服務連接到 my_network 網路

  crawler_tpex:  # 定義一個服務，名稱為 crawler_tpex
    build:
      context: ..
      dockerfile: Dockerfile
    # hostname 不寫死，讓 Docker 自動分配（scale 時才不會衝突）
    command: uv run python -m celery -A crawler.worker worker --loglevel=info --hostname=%h -Q tpex
    # 啟動容器後執行的命令，這裡是啟動 Celery worker，指定 app 為 crawler.worker，設定日誌等級為 info，
    # 使用主機名稱當作 worker 名稱（%h），並將此 worker 加入名為 "tpex" 的任務佇列 (queue)

    restart: always  # 若容器停止或崩潰，自動重新啟動
    environment:
      - TZ=Asia/Taipei  # 設定時區為台北（UTC+8）
      - RABBITMQ_HOST=rabbitmq
      - MYSQL_HOST=mysql
    networks:
      - my_network  # 將此服務連接到 my_network 網路

networks:
  my_network:
    # 加入已經存在的網路
    external: true
